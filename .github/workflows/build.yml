name: Build ARM + AMD

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - '*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: termx-server

defaults:
  run:
    working-directory: ./termx-app

jobs:

  build:

    runs-on: ubuntu-latest
    name: Build

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        working-directory: .
        run: ./gradlew clean assemble --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify vendored code in final JAR
        working-directory: .
        run: |
          echo "=== Verifying vendored code in termx-app-*-all.jar (the JAR that goes into Docker) ==="
          TERMX_JAR=$(ls termx-app/build/libs/termx-app-*-all.jar)
          echo "Checking: $TERMX_JAR"
          echo ""
          
          echo "=== Verifying PgBeanProcessor ==="
          if jar -tf "$TERMX_JAR" | grep -q "com/kodality/commons/db/bean/PgBeanProcessor.class"; then
            echo "✅ PgBeanProcessor found"
          else
            echo "❌ ERROR: PgBeanProcessor not found!"
            exit 1
          fi
          
          echo "=== Verifying NO duplicate BeanProcessor classes ==="
          BEAN_COUNT=$(jar -tf "$TERMX_JAR" | grep -c "org/apache/commons/dbutils/BeanProcessor.class" || true)
          if [ "$BEAN_COUNT" -eq "1" ]; then
            echo "✅ Only ONE BeanProcessor.class (vendored)"
          else
            echo "❌ ERROR: Found $BEAN_COUNT BeanProcessor.class files (expected 1)!"
            exit 1
          fi
          
          echo "=== Verifying NO duplicate GenerousBeanProcessor classes ==="
          GENEROUS_COUNT=$(jar -tf "$TERMX_JAR" | grep -c "org/apache/commons/dbutils/GenerousBeanProcessor.class" || true)
          if [ "$GENEROUS_COUNT" -eq "1" ]; then
            echo "✅ Only ONE GenerousBeanProcessor.class (vendored)"
          else
            echo "❌ ERROR: Found $GENEROUS_COUNT GenerousBeanProcessor.class files (expected 1)!"
            exit 1
          fi
          
          echo "=== Verifying ColumnHandler exists ==="
          if jar -tf "$TERMX_JAR" | grep -q "org/apache/commons/dbutils/ColumnHandler.class"; then
            echo "✅ ColumnHandler.class found"
          else
            echo "❌ ERROR: ColumnHandler.class not found!"
            exit 1
          fi
          
          echo ""
          echo "✅ All vendored code verified successfully - NO duplicates, all required classes present!"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print github.ref and github.base_ref
        run: |
          echo "Branch ref: ${{ github.ref }}"
          echo "Base ref: ${{ github.base_ref }}"

      - name: Set latest tag
        if: github.ref == 'refs/heads/main'
        run: echo "LATEST_TAG=latest" >> $GITHUB_ENV


      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}         
            type=raw,value=${{ env.LATEST_TAG }}
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./termx-app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
