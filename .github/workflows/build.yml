name: Build ARM + AMD

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - '*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: termx-server

defaults:
  run:
    working-directory: ./termx-app

jobs:

  build:

    runs-on: ubuntu-latest
    name: Build

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Clear Maven cache
        working-directory: .
        run: rm -rf ~/.m2/repository/com/kodality || true
      
      - name: Build
        working-directory: .
        run: ./gradlew clean assemble --no-daemon
      
      - name: Verify vendored code
        working-directory: .
        run: |
          echo "=== Checking for built JARs ==="
          ls -la kodality-commons/commons-db/build/libs/ || echo "commons-db libs dir not found"
          ls -la termx-app/build/libs/ || echo "termx-app libs dir not found"
          echo ""
          echo "=== Verifying PgBeanProcessor in commons-db JAR ==="
          if jar -tf kodality-commons/commons-db/build/libs/commons-db-*.jar | grep -q "PgBeanProcessor.class"; then
            echo "✅ PgBeanProcessor found in commons-db JAR"
          else
            echo "❌ ERROR: PgBeanProcessor not found in commons-db JAR!"
            exit 1
          fi
          echo ""
          echo "=== Verifying PgBeanProcessor in termx-app JAR ==="
          if jar -tf termx-app/build/libs/termx-app-*-all.jar | grep -q "com/kodality/commons/db/bean/PgBeanProcessor.class"; then
            echo "✅ PgBeanProcessor found in termx-app JAR"
          else
            echo "❌ ERROR: PgBeanProcessor not in termx-app JAR!"
            exit 1
          fi
          echo ""
          echo "✅ All vendored code verified successfully!"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print github.ref and github.base_ref
        run: |
          echo "Branch ref: ${{ github.ref }}"
          echo "Base ref: ${{ github.base_ref }}"

      - name: Set latest tag
        if: github.ref == 'refs/heads/main'
        run: echo "LATEST_TAG=latest" >> $GITHUB_ENV


      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}         
            type=raw,value=${{ env.LATEST_TAG }}
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./termx-app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
