micronaut:
  server:
    port: -1
  email:
    enabled: false
    from:
      email: test@test.com

datasources:
  default:
    url: jdbc:tc:postgresql:14:///termserver?TC_TMPFS=/testtmpfs:rw&TC_DAEMON=true&TC_INITSCRIPT=init.sql
    maximum.pool.size: 1
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: termserver_app
    password: ${DB_APP_PASSWORD:test}
  liquibase:
    url: jdbc:tc:postgresql:14:///termserver?TC_TMPFS=/testtmpfs:rw&TC_DAEMON=true&TC_INITSCRIPT=init.sql
    maximum.pool.size: 1
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: termserver_admin
    password: ${DB_ADMIN_PASSWORD:test}
liquibase:
  datasources:
    liquibase:
      enabled: true
      change-log: 'classpath:changelog.xml'
      default-schema: 'public'
      parameters:
        app-username: ${datasources.default.username}
netty:
  default:
    allocator:
      max-order: 3

termx:
  web-url: http://localhost:8200
  api-url: http://localhost:8200/api

auth:
  dev:
    allowed: true

javamail:
  authentication:
    username: test
    password: test
  properties:
    mail:
      smtp:
        host: localhost
        port: 1025
        auth: false
