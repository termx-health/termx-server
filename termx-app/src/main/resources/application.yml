micronaut:
  application:
    name: termx
  server:
    port: 8200
    max-request-size: 629145600 #600MB
    multipart.max-file-size: 629145600 #600MB
    thread-selection: auto
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      tx-ecosystem:
        paths: classpath:static/tx-ecosystem
        mapping: /tx-ecosystem/**
#      swagger-ui:
#        paths: classpath:META-INF/swagger/views/swagger-ui
#        mapping: /swagger-ui/**
  email:
    enabled: ${SMTP_ENABLED:false}
    from:
      email: ${SMTP_FROM:noreply@termx.dev}
    import:
      recipients: ${SMTP_TO_IMPORT:}
endpoints:
  health:
    enabled: true
    details-visible: anonymous
    sensitive: false
  info:
    enabled: true
    sensitive: false
  prometheus:
    enabled: true
    sensitive: false

info:
  version: ${APP_VERSION:dev}
  build-time: ${BUILD_TIME:}
  commit: ${GIT_COMMIT:}
  pr: ${PR_NUMBER:}

datasources:
  default:
    url: ${DB_URL:`jdbc:postgresql://localhost:5432/termx`}
    username: tx_app
    password: ${DB_APP_PASSWORD:test}
    maximum-pool-size: ${DB_POOL_SIZE:10}
    driver-class-name: org.postgresql.Driver
  liquibase:
    url: ${DB_URL:`jdbc:postgresql://localhost:5432/termx`}
    username: tx_admin
    password: ${DB_ADMIN_PASSWORD:test}
    driver-class-name: org.postgresql.Driver
    maximum-pool-size: 1
liquibase:
  datasources:
    liquibase:
      enabled: true
      async: false
      change-log: 'classpath:changelog.xml'
      default-schema: 'public'
      parameters:
        app-username: ${datasources.default.username}
auth:
  guest:
    disabled: ${GUEST_DISABLED:false}
  mock:
    enabled: ${AUTH_MOCK_ENABLED:false}
    default-user: ${AUTH_MOCK_DEFAULT_USER:admin}
    users-file: ${AUTH_MOCK_USERS_FILE:mock/users.json}
  oauth:
    jwks-url: ${OAUTH_JWKS_URL:fixme}
    jwks-cache-ttl-seconds: ${OAUTH_JWKS_CACHE_TTL_SECONDS:3600}
  privilege:
    mapper:
      # Where role names live in the OAuth token, as dot-separated claim paths (comma-separated,
      # tried in order and unioned). The default is a flat `roles` claim. Keycloak needs
      # `realm_access.roles` for realm roles, or `resource_access.<client>.roles` for client roles.
      role-claims: ${AUTH_ROLE_CLAIMS:roles}
  public:
    endpoints:
      - '/fhir-swagger'
      - '/swagger'
      - '/github/cb'
      - '/pages/static'
      - '/management/email'
      - '/tx-reg'
      - '/tx-ecosystem'

# Object storage (Minio / any S3-compatible service) used by the Binary Object Bank (Bob)
# — backs /bob/objects, wiki attachments, SNOMED / LOINC archive uploads.
#
# Local dev: defaults match scripts/run-minio.sh (which starts a `tx-minio` container with
# `minio/minio123` credentials on :9000). Run that script once and bob just works.
#
# Production: override via env. If BOB_MINIO_URL is not set at runtime, the MinioClient bean is
# not created and any Bob upload returns a clear 503 "object storage not configured" error
# (handled in BobObjectService.getMinio).
#
# The BOB_ prefix disambiguates the app's access credentials from the MinIO server's own
# root account (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD). The older MINIO_URL / MINIO_ACCESS_KEY /
# MINIO_SECRET_KEY names are no longer read — use BOB_MINIO_*.
bob:
  minio:
    # Backticks around the default — Micronaut treats `:` as the var/default delimiter,
    # so `${BOB_MINIO_URL:http://…}` parses the default as just `http`, the URL is then
    # malformed and the okhttp client inside the Minio SDK fails with
    # NoRouteToHostException. Same backtick pattern as the `datasources.default.url`
    # line at the top of this file.
    url: ${BOB_MINIO_URL:`http://localhost:9000`}
    access-key: ${BOB_MINIO_ACCESS_KEY:minio}
    secret-key: ${BOB_MINIO_SECRET_KEY:minio123}

snowstorm:
  url: https://snowstorm.termx.org/
  user: termserver-app
  password: ''
  branch: 'MAIN'
  namespace: '1000265'

# External LOINC FHIR terminology server (default the official fhir.loinc.org). When configured, TermX
# resolves http://loinc.org codes by delegating $lookup/$validate-code there instead of importing LOINC.
loinc:
  url: ${LOINC_URL:`https://fhir.loinc.org`}
  # Full Authorization header value (the server is HTTP Basic), e.g. "Basic <base64 user:pass>". Empty = off.
  authentication: ${LOINC_AUTHENTICATION:}
  # local | local-first | external — see LoincCodeSystemProvider.
  source: ${LOINC_SOURCE:local-first}

terminology-ecosystem:
  coordination-server-url: ${TERMINOLOGY_ECOSYSTEM_URL:http://tx.fhir.org/tx-reg}

kefhir:
  validation:
    # TermX IS the terminology authority — it validates codes through its own operations
    # ($validate-code/$expand), not the inbound FHIR profile validator. Strict terminology checks on
    # inbound resources reject ones referencing code systems not in the validator's context (e.g. a
    # passed-in tx-resource's CodeSystem.versionAlgorithm), which 400s otherwise-valid operation calls.
    no-terminology-checks: ${KEFHIR_NO_TERMINOLOGY_CHECKS:true}

# chef.url — the FSH (FHIR Shorthand) conversion service. Real deployments point CHEF_URL at
# an internal service (e.g. http://fsh-chef:3000); the default is the same service on
# localhost. It must NOT default to a public host: unlike the URLs below this one is called,
# not advertised, so a forgotten override would ship the deployment's own FHIR content to a
# third party's converter. Failing against localhost is the safe way to be misconfigured.
#
# The property is left always-present (rather than dropped so that
# FhirFshConverter's @Requires(property = "chef.url") disables FSH support) because
# WikiPageRelatedStructureDefinitionProvider injects that bean unguarded — see the note in
# the PR description.
chef.url: ${CHEF_URL:`http://localhost:3000`}
#github:
#  client:
#    id: 'client-id'
#    secret: 'secret'
#  app-name: ${GITHUB_APP_NAME}

termx:
  # web-url / api-url are THIS deployment's own externally-reachable addresses. api-url is
  # not merely cosmetic: it becomes CapabilityStatement.implementation.url, which kefhir
  # copies into the /fhir-swagger `servers` block — so a wrong value tells clients to send
  # requests to a different deployment, silently. That is exactly how this went wrong when
  # the default was a real hostname: environments that never set the override advertised it.
  #
  # The defaults are therefore localhost on purpose — obviously-local when a deployment
  # forgets to override, never some other environment's real address. Set TERMX_WEB_URL and
  # TERMX_API_URL in every real deployment.
  #
  # Backticks around the defaults for the same reason as bob.minio.url below: Micronaut
  # treats `:` as the var/default delimiter, so ${TERMX_API_URL:http://…} would parse the
  # default as just `http` and yield a malformed URL.
  web-url: ${TERMX_WEB_URL:`http://localhost:4200`}
  api-url: ${TERMX_API_URL:`http://localhost:8200/api`}
  release:
    # Object-store container for release attachments. Override when several installations share one
    # object store and need their buckets kept apart.
    attachment-container: ${TERMX_RELEASE_ATTACHMENT_CONTAINER:release}
  # FHIR terminology conformance testing (tx-ecosystem suite via the FHIR validator's txTests).
  # validator-jar: absolute path to validator_cli.jar (NOT bundled — provided by the deployment, e.g.
  # downloaded in the Dockerfile). tx-url: this server's externally-reachable FHIR base for -tx.
  conformance:
    validator-jar: ${TERMX_CONFORMANCE_VALIDATOR_JAR:}
    tx-url: ${TERMX_CONFORMANCE_TX_URL:`http://localhost:8200/fhir`}
    # Optional: dir holding the tx-ecosystem test fixtures to load when a run requests loadSetup=true.
    # Defaults to the FHIR validator's package cache (~/.fhir/packages/hl7.fhir.uv.tx-ecosystem#current/package/tests).
    test-package-dir: ${TERMX_CONFORMANCE_TEST_PACKAGE_DIR:}
    # Bearer token the setup loader uses to write fixtures over HTTP (writes need CodeSystem/ValueSet
    # create+update privileges — unauthenticated guest writes are 403). Locally this is the dev token.
    setup-auth-token: ${TERMX_CONFORMANCE_SETUP_AUTH_TOKEN:}
  fhir:
    codesystem:
      lookup:
        default-property-mode: ALL
      search:
        # Default value applied to `_summary` when the client does not pass it
        # on GET /fhir/CodeSystem search. Accepts: true | text | data | count | false.
        # `true` (or any non-`false` value) suppresses the heavy `concept` list in
        # search results. Override per request with `?_summary=...`.
        default-summary: ${TERMX_FHIR_CS_SEARCH_DEFAULT_SUMMARY:true}
    valueset:
      search:
        # Same as codesystem.search.default-summary, but for GET /fhir/ValueSet.
        # When non-`false`, inline `compose.include.concept` lists are suppressed.
        default-summary: ${TERMX_FHIR_VS_SEARCH_DEFAULT_SUMMARY:true}
    conceptmap:
      search:
        # Same as codesystem.search.default-summary, but for GET /fhir/ConceptMap.
        # When non-`false`, the `group.element` mapping list is suppressed.
        default-summary: ${TERMX_FHIR_CM_SEARCH_DEFAULT_SUMMARY:true}

javamail:
  authentication:
    username: ${SMTP_USERNAME:no-auth-required}
    password: ${SMTP_PASSWORD:no-auth-required}
  properties:
    mail:
      smtp:
        host: ${SMTP_HOST:}
        port: ${SMTP_PORT:587}
        auth: ${SMTP_AUTH:true}
        starttls:
          enable: ${SMTP_STARTTLS:true}

# Ensures Micronaut applies logger.levels from profile-specific files (e.g. application-local.yml).
# Without a top-level "logger" entry, logger levels from local-only YAML may not be applied.
logger:
  levels: {}
