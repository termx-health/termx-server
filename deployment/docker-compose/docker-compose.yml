version: '3.9'
services:
  termx-server:
    restart: unless-stopped
    image: docker.kodality.com/termx-server:latest
    container_name: termx-server
    depends_on:
      - termx-postgres
      - termx-minio
    env_file:
      - server.env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://termx-server:8200/health" ]
      interval: 5s
      timeout: 5s
      retries: 60
    ports:
      - 8200:8200
    mem_reservation: 2g

  termx-web:
    restart: unless-stopped
    image: docker.kodality.com/termx-web:latest
    container_name: termx-web
    depends_on:
      - termx-server
    volumes:
      - ./env.js:/usr/share/nginx/html/assets/env.js
    ports:
      - 9000:80

  termx-postgres:
    restart: unless-stopped
    image: postgres:14
    container_name: termx-postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    env_file:
      - pg.env
    ports:
      - 5432:5432
    shm_size: 1g

  # Object storage for Bob (Wiki attachments, SNOMED / LOINC archives, etc.).
  # Default credentials match the dev script `scripts/run-minio.sh` so operators
  # who lift this compose file get the same values. Override via server.env:
  #   MINIO_ROOT_USER / MINIO_ROOT_PASSWORD here, MINIO_ACCESS_KEY / MINIO_SECRET_KEY
  # on the termx-server side — keep them in sync.
  termx-minio:
    restart: unless-stopped
    image: minio/minio:latest
    container_name: termx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - ./minio-data:/data
    ports:
      - 9000:9000
      - 9001:9001
  termx-swagger:
    restart: unless-stopped
    image: swaggerapi/swagger-ui
    container_name: termx-swagger
    env_file:
      - swagger.env
    ports:
      - 8000:8080
